name: Build Android APK

# Собирает debug-APK приложения GROT в облаке GitHub.
# Триггер: пуш в main или ручной запуск (вкладка Actions → Run workflow).
# Готовый APK — во вкладке Actions → последний запуск → Artifacts → grot-apk.

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'android/**'
      - 'package.json'
      - 'capacitor.config.json'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write   # нужно для публикации APK в Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22   # Capacitor CLI 8 требует Node >= 22

      - name: Install root deps (Capacitor + Bluetooth plugin)
        run: npm install

      - name: Install frontend deps
        run: npm install --prefix frontend

      - name: Build web (prod API) + sync to Android
        run: npm run sync:app

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'   # Capacitor 8 компилирует Android под Java 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: grot-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Публикуем APK в Release с постоянным тегом "latest" —
      # прямая ссылка для скачивания на планшет:
      # https://github.com/<owner>/<repo>/releases/latest/download/app-debug.apk
      - name: Publish APK to Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: GROT — последняя сборка APK
          body: |
            Приложение GROT (debug APK).
            Скачать на планшет: нажми **app-debug.apk** ниже.
          files: android/app/build/outputs/apk/debug/app-debug.apk
